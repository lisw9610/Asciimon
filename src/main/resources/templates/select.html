<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Card</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="page">
    <div class="panel">
        <h1>Select Your Card</h1>
        <p>Choose one card to begin the match.</p>

        <div class="grid">
            <div class="card-option" th:each="cardName : ${cards}">
                <h2 th:text="${cardName}">Fire Slime</h2>
                <p>Ready for battle.</p>
                <a class="button primary" th:href="@{/battle(card=${cardName})}">Choose</a>
            </div>
        </div>

        <a class="button secondary" th:href="@{/}">Back Home</a>
    </div>
</div>
</body>
</html>
