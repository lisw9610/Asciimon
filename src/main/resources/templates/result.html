<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page">
    <section class="panel hero">
        <p class="eyebrow">Match Complete</p>
        <h1>[[${winner}]] won!</h1>
        <p class="subtitle">Battle finished successfully.</p>

        <div class="log-box">
            <pre class="ascii-card">[[${battleLogText}]]</pre>
        </div>

        <div class="nav-row">
            <form method="get" action="/select">
                <button class="button primary" type="submit">Play Again</button>
            </form>
            <form method="post" action="/reset">
                <button class="button secondary" type="submit">Home</button>
            </form>
        </div>
    </section>
</div>
</body>
</html>
