<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asciimon</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page">
    <section class="panel hero">
        <p class="eyebrow">ASCII Card Battle</p>
        <h1>Asciimon</h1>
        <p class="subtitle">Enter your name and start the game.</p>

        <form class="start-form" method="get" action="/select">
            <label for="playerName">Player Name</label>
            <input id="playerName" name="playerName" type="text" placeholder="Player 1" value="Player 1">
            <button class="button primary" type="submit">Start Game</button>
        </form>
    </section>
</div>
</body>
</html>
